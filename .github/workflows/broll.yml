name: Content Creator

on:
  schedule:
    - cron: '15 6 * * *'   # 6:30am EST (11:30am UTC)
    - cron: '15 10 * * *'  # 10:30am EST (3:30pm UTC)
    - cron: '15 14 * * *'  # 2:30pm EST (6:30pm UTC)
    - cron: '18 18 * * *'  # 6:30pm EST (10:30pm UTC)
    - cron: '40 23 * * *'  # 11:40pm EST (4:40am UTC next day)
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg and curl
        run: choco install ffmpeg curl -y

      - name: Install dependencies
        run: pip install requests anthropic certifi

      - name: Run creator
        env:
          AIRTABLE_PERSONAL_ACCESS_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          BLOTATO_TIKTOK_ACCOUNT_ID: ${{ secrets.BLOTATO_TIKTOK_ACCOUNT_ID }}
          BLOTATO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.BLOTATO_INSTAGRAM_ACCOUNT_ID }}
          AUTO_POST_PLATFORMS: ${{ secrets.AUTO_POST_PLATFORMS }}
        run: python simple_creator.py