name: B-Roll Downloader

on:
  schedule:
    - cron: '15 10 * * *'  # 10:30am EST (3:30pm UTC)
    - cron: '15 14 * * *'  # 2:30pm EST (6:30pm UTC)
    - cron: '15 18 * * *'  # 6:30pm EST (10:30pm UTC)
    - cron: '15 22 * * *'  # 10:30pm EST (3:30am UTC next day)
  workflow_dispatch:  # Allow manual run

jobs:
  run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run broll downloader
        env:
          AIRTABLE_PERSONAL_ACCESS_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: python broll_downloader.py